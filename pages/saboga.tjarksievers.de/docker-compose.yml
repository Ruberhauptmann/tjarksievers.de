services:
  saboga-frontend:
    image: ghcr.io/ruberhauptmann/saboga-frontend:0.0.11
    container_name: saboga-frontend
    labels:
      - "traefik.http.routers.saboga-frontend.rule=Host(`saboga.tjarksievers.de`)"
      - "traefik.http.routers.saboga-frontend.tls=true"
      - "traefik.http.routers.saboga-frontend.tls.certresolver=certresolver"
    depends_on:
      - reverse-proxy
      - saboga-api
    restart: always
    networks:
      - reverse-proxy
      - saboga-api

  saboga-api:
    image: ghcr.io/ruberhauptmann/saboga-api:0.1.6
    container_name: saboga-api
    labels:
      - "traefik.http.routers.saboga-api.rule=Host(`saboga.tjarksievers.de`) && PathPrefix(`/api`)"
      - "traefik.http.routers.saboga-api.tls=true"
      - "traefik.http.routers.saboga-api.tls.certresolver=certresolver"
      - "traefik.http.routers.saboga-api.middlewares=strip-api-prefix"
      - "traefik.http.middlewares.strip-api-prefix.stripPrefix.prefixes=/api"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN}
      BGG_USERNAME: ${BGG_USERNAME}
      BGG_PASSWORD: ${BGG_PASSWORD}
      BGG_API_KEY: ${BGG_API_KEY}
    volumes:
      - saboga_api_img:/app/img
    restart: always
    expose:
      - "8000"
    depends_on:
      - reverse-proxy
    networks:
      - reverse-proxy
      - saboga-api
      - loki

  # static file server using nginx
  static-server:
    image: nginx:alpine
    build: .
    container_name: saboga-static
    labels:
      - "traefik.http.routers.saboga-static.rule=Host(`saboga.tjarksievers.de`) && PathPrefix(`/api/static`)"
      - "traefik.http.routers.saboga-static.tls=true"
      - "traefik.http.routers.saboga-img.rule=Host(`saboga.tjarksievers.de`) && PathPrefix(`/api/img`)"
      - "traefik.http.routers.saboga-img.tls=true"
      - "traefik.docker.network=saboga-reverse-proxy"
    volumes:
      - staticfiles:/usr/share/nginx/html/static:ro
      - saboga_api_img:/usr/share/nginx/html/img:ro
    networks:
      - reverse-proxy

  saboga-manage:
    image: ghcr.io/ruberhauptmann/saboga-api:0.1.6
    container_name: saboga-manage
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN}
    restart: always
    networks:
      - saboga-api
    profiles:
      - manage

  saboga-database:
    image: postgres:17
    container_name: saboga-database
    volumes:
      - saboga_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: saboga
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN}
    networks:
      - saboga-api

volumes:
  saboga_db_data:
  saboga_api_img:
  staticfiles:

networks:
  saboga-api:
    driver: bridge
    internal: true
